[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Handle dynamic routes
[[redirects]]
  from = "/courses/:slug"
  to = "/courses/:slug"
  status = 200

[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
